dependencies:
  idf: ">=5.3"
  # WiFi for the ESP32-P4 is provided by the on-board ESP32-C6 over esp-hosted.
  # esp_wifi_remote routes the standard esp_wifi APIs to it; esp_hosted is the
  # SDIO transport + the C6 slave firmware (deployed from P4 flash).
  espressif/esp_wifi_remote: "*"
  espressif/esp_hosted: "*"
  # Display: ST7701S over MIPI-DSI + LVGL
  espressif/esp_lcd_st7701: "*"
  espressif/esp_lvgl_port: "^2"
  lvgl/lvgl: "^9.3.0"   # esp_lvgl_port 2.x needs LV_COLOR_FORMAT_RGB565_SWAPPED (9.3+)
